name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint backend
        working-directory: backend
        run: |
          npm ci
          npx eslint "{src,test}/**/*.ts" --max-warnings=0
      - name: Lint admin
        working-directory: admin
        run: |
          npm ci
          npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Test backend avec couverture
        working-directory: backend
        run: |
          npm ci
          npm run test -- --coverage

  build-backend:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: payslip-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: 'Vérifier taille image < 200 Mo'
        run: |
          SIZE=$(docker image inspect payslip-backend:ci --format '{{.Size}}')
          MAX=$((200 * 1024 * 1024))
          echo "Taille image: $SIZE octets (max $MAX)"
          test "$SIZE" -lt "$MAX"

  build-admin:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build admin
        working-directory: admin
        run: |
          npm ci
          npm run build
