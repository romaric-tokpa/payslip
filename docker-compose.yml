# PaySlip Manager — services locaux (CDC §5–6)
services:
  postgres:
    image: postgres:16-alpine
    container_name: payslip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: payslip
      POSTGRES_PASSWORD: payslip
      POSTGRES_DB: payslip
    # Hôte 5433 → évite le conflit avec Postgres.app / PostgreSQL local sur 5432
    ports:
      - "5433:5432"
    volumes:
      - payslip_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: payslip-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: payslip-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - payslip_minio_data:/data

volumes:
  payslip_pg_data:
  payslip_minio_data:
